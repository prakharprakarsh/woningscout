# Prometheus configuration for WoningScout
# Scrapes the /metrics endpoint on the API server

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "woningscout-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "woningscout"
          component: "api"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
